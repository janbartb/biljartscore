<div>
    <div class="cmp-menu" [style.text-align]="menu.centered ? 'center' : ''">
        <div class="flexbox flexcolumn flexcenter">
            @for (item of menu.items; track $index) {
                <div>
                    <app-menu-item [menuItem]="item" [selected]="menu.selectedIdx == $index" (itemClicked)="itemClicked(item)"></app-menu-item>
                </div>
            }    
        </div>
    </div>
</div>
