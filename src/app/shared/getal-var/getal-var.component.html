<div class="flexbox flexright getal-container" [style.width]="getalWidth + 'em'">
    @for (cijfer of cijfers; track $index) {
        @if (cijfer == ',') {
            <div class="komma"><span>,</span></div>
        }
        @else {
            <app-cijfer [cijfer]="cijfer" [moveUp]="moveUp"></app-cijfer>
        }
    }
</div>
