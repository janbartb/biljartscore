@if (alertService.visible) {
    <div class="alert-container">
        <div class="alert-content w3-animate-opacity" (click)="alertService.visible = false">
            <div class="w3-container w3-border w3-round-large" [ngClass]="alertService.alert.clazz">
                <div style="padding: .75em 1em; text-align: center;">
                    <span>{{alertService.alert.text}}</span>
                </div>
            </div>
        </div>
    </div>    
}
