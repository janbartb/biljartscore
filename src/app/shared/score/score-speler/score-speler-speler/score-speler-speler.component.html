<div class="speler-data flexbox flexstretch">
    <!-- naam en te spelen moyenne -->
    <div style="width: 20em;">
        <div class="speler-naam">
            <span>{{naam}}</span>
        </div>
        <div class="speler-tsmoy">
            <div style="position: relative; top: -.5em; line-height: 2.5em;">
                <span style="font-size: 2em; color: lightgray;">moy: </span>
                <span style="font-size: 2.5em; padding-right: .5em;">{{moy | number:'1.3-3':'nl-NL'}}</span>
            </div>
        </div>
    </div>
    <!-- biljartbal -->
    <div class="speler-bal">
        @if (actief) {
            <div data-kleur="" class="biljartbal fullheight flexbox flexcenter flexmiddle"
                    [ngClass]="wit ? 'wit' : 'geel'">
                <div>
                    <span style="line-height: 1;" style="color: black;" 
                            [style.font-size]="cars > 99 ? '3.5em' : '4.5em'">{{cars > 0 ? cars : ''}}</span>
                </div>
            </div>
        }
        @else {
            <div class="bal fullheight flexbox flexcenter flexmiddle">
                <div>
                    <span style="line-height: 1;" [style.color]="wit ? 'white' : 'gold'" 
                            [style.font-size]="cars > 99 ? '3.5em' : '4.5em'">{{cars > 0 ? cars : ''}}</span>
                </div>
            </div>
        }
    </div>
</div>
