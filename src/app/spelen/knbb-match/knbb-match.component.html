<div class="fullviewheight">
    @if (matchRead) {
        <div class="fullheight flexbox flexcolumn">
            <div>
                <app-page-header [title]="'KNBB match'" [subtitle]="subtitle" [spel]="appData.getSpelNaam()"
                            (prevClicked)="escapePressed()" (hdrClicked)="headerClicked($event)"></app-page-header>
            </div>
            <div style="height: 25.5em;">
                <div class="flexbox flexstart">
                    <div style="flex: 0 0 29em; border-right: .25em solid green; height: 25.5em;">
                        <app-knbb-match-speler [match]="match" [idx]="0" [status]="wedStatus" style="color: white;"></app-knbb-match-speler>
                    </div>
                    <div style="flex: 0 0 2em; height: 25.5em;">
                        <div style="height: 3.5em; background-color: white;"></div>
                        <div style="height: 21em; padding: .25em .5em;">
                            @switch (wedStatus) {
                                @case (0) {
                                    <div class="thermo-start clickable" (click)="wedstrijdClicked()"></div>
                                }
                                @case (1) {
                                    <div class="thermo filler filler-lgreen clickable" (click)="wedstrijdClicked()" 
                                            [style.background-size]="'100% ' + voortgang"></div>
                                }
                                @case (2) {
                                    <div class="thermo-end clickable" (click)="wedstrijdClicked()"></div>
                                }
                            }
                        </div>
                    </div>
                    <div style="flex: 0 0 29em; border-left: .25em solid green; height: 25.5em; background-color: gold;">
                        <app-knbb-match-speler [match]="match" [idx]="1" [status]="wedStatus" style="color: gold;"></app-knbb-match-speler>
                    </div>
                </div>
            </div>
            <div style="height: .5em; min-height: .5em; background-color: green;">
            </div>
            <div class="flexgrow1" style="padding-top: .5em;">
                <div class="flexbox flexmiddle flexcenter" style="font-size: 1.25em;">
                    <div class="flexbox flexmiddle">
                        @for (btn of buttonGroup.buttons; track $index) {
                            <app-button [button]="btn" (buttonClicked)="buttonClicked($index)"></app-button>
                        }
                    </div>
                </div>
            </div>
        </div>
    }
</div>
