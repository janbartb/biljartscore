<div class="fullviewheight">
    <div class="fullheight flexbox flexcolumn">
        <div>
            <app-page-header [title]="'Onderhoud gegevens'" [subtitle]="'Account toevoegen'" [spel]="appData.getSpelNaam()" [escCount]="escapeCount" 
                    (escClicked)="escapePressed()" (hdrClicked)="headerClicked($event)" (prevClicked)="previousPressed()"></app-page-header>
        </div>
        <div class="flexgrow1">
            <div class="flexbox flexcenter" style="padding-top: 2em;">
                <div>
                    @if (accountForm) {
                        <form [formGroup]="accountForm">
                            <table class="tbl-normal tbl-input">
                                <tbody>
                                    <tr>
                                        <td>
                                            <label for="userId">ID<span class="req"> *</span></label>
                                        </td>
                                        <td>
                                            <input #userid type="text" id="userId" style="width: 6em;" formControlName="userId" autocomplete="off"
                                                [ngClass]="{'invalid': userId?.invalid && (userId?.dirty), 'valid': userId?.valid && (userId?.dirty)}"
                                                (blur)="userId?.setValue(userId?.value.trim())">
                                        </td>
                                    </tr>
                                    @if (userId?.hasError('noDuplicates')) {
                                        <tr class="input-msg error">
                                            <td></td>
                                            <td><span>ID wordt al gebruikt</span></td>
                                        </tr>
                                    }
                                    <tr>
                                        <td>
                                            <label for="password">Password<span class="req"> *</span></label>
                                        </td>
                                        <td>
                                            @if (role?.value == 'gebruiker') {
                                                <span style="padding-left: .25em;">bss</span>
                                            }
                                            @else {
                                                <input #pw type="text" id="password" style="width: 12em;" formControlName="password" autocomplete="off"
                                                    [ngClass]="{'invalid': password?.invalid && (password?.dirty), 'valid': password?.valid && (password?.dirty)}"
                                                    (blur)="password?.setValue(password?.value.trim())">
                                            }
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <label for="role">Rol<span class="req"> *</span></label>
                                        </td>
                                        <td>
                                            <select id="role" formControlName="role">
                                                @for (rol of rollen; track $index) {
                                                    <option [ngValue]="rol">{{rol}}</option>
                                                }
                                            </select>                                
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <label for="verId">Vereniging</label>
                                        </td>
                                        <td>
                                            <select id="verId" formControlName="verId">
                                                <option value=""></option>
                                                @for (ver of verenigingen; track $index) {
                                                    <option [ngValue]="ver.verId">{{ver.naam}}</option>
                                                }
                                            </select>                                
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <label for="klasse">Klasse</label>
                                        </td>
                                        <td>
                                            <select id="klasse" formControlName="klasse">
                                                <option value=""></option>
                                                @for (klas of klassen; track $index) {
                                                    <option [ngValue]="klas">{{klas}}</option>
                                                }
                                            </select>                                
                                        </td>
                                    </tr>

                                </tbody>
                            </table>
                        </form>
                    }
                </div>
            </div>
        </div>
        @if (accountForm && accountForm.valid) {
            <app-section-footer-btns [buttons]="buttons" (clickedButton)="buttonClicked($event)"
                        [cssFooter]="'w3-green-bdr-d1'" [cssButtons]="'font125'"></app-section-footer-btns>
        }
    </div>
</div>
