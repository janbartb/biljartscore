<div class="fullviewheight">
    <div class="fullheight flexbox flexcolumn">
        <div>
            <app-page-header [title]="title" [subtitle]="subtitle" [spel]="appData.getSpelNaam()" (prevClicked)="previousPressed()"></app-page-header>
        </div>
        <div class="flexgrow1 flexbox flexcenter flexmiddle" style="font-size: 1.25em;">
            <app-menu [menu]="menu" (menuItemClicked)="menuItemClicked($event)"></app-menu>
        </div>
    </div>
</div>
